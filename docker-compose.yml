services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - duevora-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: node:20-alpine
    container_name: duevora-server-dev
    working_dir: /app/server
    command: node ../scripts/watch-package.js npm run dev -- -L
    volumes:
      - .:/app
      - /app/server/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379

  client:
    image: node:20-alpine
    container_name: duevora-client-dev
    working_dir: /app/client
    command: sh -c "npm install && npx vite --host"
    volumes:
      - .:/app
      - /app/client/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://server:3000
    depends_on:
      - server

volumes:
  duevora-redis-data:
